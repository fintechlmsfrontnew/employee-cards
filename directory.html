<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Directory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .directory-container {
            padding: 50px 20px;
        }
        .employee-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .employee-card:hover {
            transform: translateY(-3px);
        }
        .employee-link {
            text-decoration: none;
            color: inherit;
        }
        .employee-link:hover {
            text-decoration: none;
            color: inherit;
        }
        .qr-code {
            width: 80px;
            height: 80px;
            background: #f0f0f0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="directory-container">
            <h1 class="text-center text-white mb-5">Employee Directory</h1>
            <div class="row">
                <div class="col-md-6 col-lg-4">
                    <a href="aman-samani.html" class="employee-link">
                        <div class="employee-card">
                            <div class="d-flex align-items-center">
                                <div class="qr-code me-3">
                                    QR Code
                                </div>
                                <div>
                                    <h5>Aman Samani</h5>
                                    <p class="mb-0 text-muted">Product Designer</p>
                                    <small class="text-muted">Fintech Smart Solutions</small>
                                </div>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
