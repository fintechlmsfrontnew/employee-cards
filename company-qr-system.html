<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech Smart Solutions - QR System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #202c65 0%, #234294 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .company-header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .company-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .company-header p {
            font-size: 16px;
            opacity: 0.9;
            margin: 0;
        }
        .qr-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .employee-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .employee-card {
            background: linear-gradient(145deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(32, 44, 101, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .employee-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(32, 44, 101, 0.2);
        }
        .employee-name {
            color: #202c65;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .employee-designation {
            color: #234294;
            font-size: 14px;
            margin-bottom: 15px;
            font-weight: 500;
        }
        .qr-code {
            width: 150px;
            height: 150px;
            margin: 0 auto 15px;
            border: 3px solid #202c65;
            border-radius: 10px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qr-code img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 7px;
        }
        .employee-url {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            color: #202c65;
            margin-top: 10px;
            word-break: break-all;
            border: 1px solid #e0e0e0;
        }
        .copy-btn {
            background: #202c65;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.3s ease;
        }
        .copy-btn:hover {
            background: #234294;
        }
        .copy-btn.copied {
            background: #28a745;
        }
        .add-employee-btn {
            background: linear-gradient(135deg, #202c65 0%, #234294 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px auto;
            display: block;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }
        .add-employee-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(32, 44, 101, 0.3);
        }
        .employee-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: none;
        }
        .employee-form.show {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-label {
            color: #202c65;
            font-weight: 600;
            margin-bottom: 5px;
            display: block;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-control:focus {
            outline: none;
            border-color: #202c65;
            box-shadow: 0 0 0 3px rgba(32, 44, 101, 0.1);
        }
    </style>
</head>
<body>
    <div class="company-header">
        <h1><i class="fas fa-qrcode"></i> Fintech Smart Solutions</h1>
        <p>Professional Employee Digital Cards System</p>
    </div>

    <div class="qr-container">
        <button class="add-employee-btn" onclick="toggleAddEmployee()">
            <i class="fas fa-plus"></i> Add Employee QR Code
        </button>

        <div id="employeeForm" class="employee-form">
            <h3 style="color: #202c65; margin-bottom: 20px;">Add New Employee</h3>
            <div class="form-group">
                <label class="form-label">Employee Name</label>
                <input type="text" id="empName" class="form-control" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label class="form-label">Designation</label>
                <input type="text" id="empDesignation" class="form-control" placeholder="Software Engineer">
            </div>
            <div class="form-group">
                <label class="form-label">Profile URL</label>
                <input type="url" id="empUrl" class="form-control" placeholder="https://fintechlmsfrontnew.github.io/employee-cards/john-doe.html">
            </div>
            <button class="add-employee-btn" onclick="addEmployee()">
                <i class="fas fa-save"></i> Generate QR Code
            </button>
        </div>

        <div id="employeeGrid" class="employee-grid">
            <!-- Satendra Card -->
            <div class="employee-card">
                <div class="employee-name">Satendra Upadhyay</div>
                <div class="employee-designation">Founder</div>
                <div class="qr-code">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://fintechlmsfrontnew.github.io/employee-cards/satendra.html&format=png&margin=10" alt="Satendra QR Code">
                </div>
                <div class="employee-url">https://fintechlmsfrontnew.github.io/employee-cards/satendra.html</div>
                <button class="copy-btn" onclick="copyURL('https://fintechlmsfrontnew.github.io/employee-cards/satendra.html')">
                    <i class="fas fa-copy"></i> Copy URL
                </button>
            </div>
        </div>
    </div>

    <script>
        function toggleAddEmployee() {
            const form = document.getElementById('employeeForm');
            form.classList.toggle('show');
        }

        function addEmployee() {
            const name = document.getElementById('empName').value;
            const designation = document.getElementById('empDesignation').value;
            const url = document.getElementById('empUrl').value;

            if (!name || !designation || !url) {
                alert('Please fill all fields');
                return;
            }

            const qrCodeUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(url)}&format=png&margin=10`;
            
            const employeeCard = `
                <div class="employee-card">
                    <div class="employee-name">${name}</div>
                    <div class="employee-designation">${designation}</div>
                    <div class="qr-code">
                        <img src="${qrCodeUrl}" alt="${name} QR Code">
                    </div>
                    <div class="employee-url">${url}</div>
                    <button class="copy-btn" onclick="copyURL('${url}')">
                        <i class="fas fa-copy"></i> Copy URL
                    </button>
                </div>
            `;

            const grid = document.getElementById('employeeGrid');
            grid.insertAdjacentHTML('beforeend', employeeCard);

            // Clear form
            document.getElementById('empName').value = '';
            document.getElementById('empDesignation').value = '';
            document.getElementById('empUrl').value = '';
            document.getElementById('employeeForm').classList.remove('show');
        }

        function copyURL(url) {
            const copyBtn = event.target;
            
            navigator.clipboard.writeText(url).then(() => {
                copyBtn.textContent = '✓ Copied!';
                copyBtn.classList.add('copied');
                
                setTimeout(() => {
                    copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy URL';
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>
</html>
