<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satendra Upadhyay - Founder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #202c65 0%, #234294 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .employee-card {
            background: linear-gradient(145deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(32, 44, 101, 0.3), 0 10px 20px rgba(35, 66, 148, 0.2);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(35, 66, 148, 0.1);
        }
        .employee-card:hover {
            transform: translateY(-5px);
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 4px solid #202c65;
            object-fit: cover;
            box-shadow: 0 8px 16px rgba(32, 44, 101, 0.2);
        }
        .employee-name {
            color: #202c65;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(32, 44, 101, 0.1);
            letter-spacing: -0.5px;
        }
        .employee-designation {
            color: #234294;
            font-size: 18px;
            margin-bottom: 8px;
            font-weight: 600;
            position: relative;
            display: inline-block;
        }
        .employee-designation::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #202c65, #234294);
            border-radius: 1px;
        }
        .company-name {
            color: #6c757d;
            font-size: 16px;
            margin-bottom: 20px;
            font-weight: 400;
            font-style: italic;
            opacity: 0.8;
        }
        .contact-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .contact-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(145deg, #202c65 0%, #234294 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 10px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(32, 44, 101, 0.3);
        }
        .contact-icon:hover {
            background: linear-gradient(145deg, #234294 0%, #202c65 100%);
            color: white;
            transform: translateY(-3px) scale(1.1);
            box-shadow: 0 8px 20px rgba(32, 44, 101, 0.4);
        }
        .contact-info {
            text-align: left;
            margin-top: 20px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 12px;
            background: linear-gradient(145deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 10px;
            border-left: 4px solid #202c65;
            box-shadow: 0 2px 8px rgba(32, 44, 101, 0.1);
        }
        .contact-item i {
            width: 30px;
            color: #202c65;
            margin-right: 15px;
            font-size: 16px;
        }
        .contact-item a {
            color: #234294;
            text-decoration: none;
            font-weight: 500;
        }
        .contact-item a:hover {
            color: #202c65;
            text-decoration: underline;
        }
        .add-contact-btn {
            background: linear-gradient(135deg, #202c65 0%, #234294 100%);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(32, 44, 101, 0.3);
            letter-spacing: 0.5px;
        }
        .add-contact-btn:hover {
            transform: translateY(-2px) scale(1.05);
            background: linear-gradient(135deg, #234294 0%, #202c65 100%);
            box-shadow: 0 10px 25px rgba(32, 44, 101, 0.4);
        }
        
        /* Mobile Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 20px;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }
            
            .employee-card {
                width: 95%;
                max-width: 360px;
                padding: 30px 25px;
                margin: 0 auto;
            }
            
            .profile-img {
                width: 100px;
                height: 100px;
                margin-bottom: 15px;
            }
            
            .employee-name {
                font-size: 24px;
                margin-bottom: 8px;
            }
            
            .employee-designation {
                font-size: 14px;
                margin-bottom: 8px;
            }
            
            .company-name {
                font-size: 14px;
                margin-bottom: 15px;
            }
            
            .contact-icons {
                gap: 15px;
                margin-bottom: 20px;
            }
            
            .contact-icon {
                width: 45px;
                height: 45px;
                margin: 0 8px;
            }
            
            .contact-info {
                margin-top: 15px;
            }
            
            .contact-item {
                padding: 15px;
                margin-bottom: 12px;
                flex-direction: column;
                align-items: flex-start;
                text-align: left;
            }
            
            .contact-item i {
                margin-bottom: 8px;
                margin-right: 0;
            }
            
            .contact-item a {
                font-size: 14px;
                line-height: 1.4;
            }
            
            .add-contact-btn {
                padding: 12px 30px;
                font-size: 14px;
                margin-top: 15px;
                width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            .employee-card {
                width: 98%;
                padding: 25px 20px;
            }
            
            .profile-img {
                width: 90px;
                height: 90px;
            }
            
            .employee-name {
                font-size: 22px;
            }
            
            .employee-designation {
                font-size: 13px;
            }
            
            .company-name {
                font-size: 13px;
                margin-bottom: 12px;
            }
            
            .contact-icon {
                width: 40px;
                height: 40px;
                margin: 0 6px;
            }
            
            .contact-item {
                padding: 12px;
            }
            
            .contact-item a {
                font-size: 13px;
            }
            
            .add-contact-btn {
                padding: 10px 25px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="employee-card">
            <img src="satendra-pic.jpg" alt="Profile" class="profile-img">
            
            <h1 class="employee-name">Satendra Upadhyay</h1>
            <p class="employee-designation">Founder</p>
            <p class="company-name">Fintech Smart Solutions</p>
            
            <div class="contact-icons">
                <a href="tel:+919899886088" class="contact-icon">
                    <i class="fas fa-phone"></i>
                </a>
                <a href="mailto:satendralibra@gmail.com" class="contact-icon">
                    <i class="fas fa-envelope"></i>
                </a>
                <a href="https://maps.app.goo.gl/Wk2ikRuifGNoDMdD8" class="contact-icon">
                    <i class="fas fa-map-marker-alt"></i>
                </a>
            </div>
            
            <div class="contact-info">
                <div class="contact-item">
                    <i class="fas fa-phone"></i>
                    <div>
                        <strong>Phone:</strong>
                        <a href="tel:+919899886088">+91 9899886088</a>
                    </div>
                </div>
                
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <strong>Email:</strong>
                        <a href="mailto:satendralibra@gmail.com">satendralibra@gmail.com</a>
                    </div>
                </div>
                
                <div class="contact-item">
                    <i class="fas fa-globe"></i>
                    <div>
                        <strong>Website:</strong>
                        <a href="https://fintechsmartsolutions.com/" target="_blank">fintechsmartsolutions.com</a>
                    </div>
                </div>
                
                <div class="contact-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <div>
                        <strong>Location:</strong>
                        <a href="https://maps.app.goo.gl/Wk2ikRuifGNoDMdD8" target="_blank">D-6, Sector 2, Noida Uttar Pradesh, 201301 (Near- Priyagold)</a>
                    </div>
                </div>
            </div>
            
            <button class="add-contact-btn" onclick="addToContact()">
                <i class="fas fa-user-plus"></i> Add Contact
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function addToContact() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Satendra Upadhyay
ORG:Fintech Smart Solutions
TITLE:Founder
TEL:+919899886088
EMAIL:satendralibra@gmail.com
URL:https://fintechsmartsolutions.com/
ADR:;;28.5826962,77.3151284;New Delhi;Delhi;110017;India
END:VCARD`;
            
            // Create VCF file and trigger direct save
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            
            // Try to open contact app directly (mobile)
            if (/Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                // Mobile: Direct contact import
                const dataUrl = 'data:text/vcard;charset=utf-8,' + encodeURIComponent(vcard);
                window.location.href = dataUrl;
                showContactSavedMessage();
            } else {
                // Desktop: Try to open in new tab first
                const dataUrl = 'data:text/vcard;charset=utf-8,' + encodeURIComponent(vcard);
                const newWindow = window.open(dataUrl, '_blank');
                if (newWindow) {
                    showContactSavedMessage();
                } else {
                    // Fallback: Force download
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'satendra_upadhyay.vcf';
                    a.style.display = 'none';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    showContactSavedMessage();
                }
            }
        }
        
        function downloadVCard(url) {
            const a = document.createElement('a');
            a.href = url;
            a.download = 'satendra_upadhyay.vcf';
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
            
            // Show success message
            showContactSavedMessage();
        }
        
        function showContactSavedMessage() {
            const message = document.createElement('div');
            message.innerHTML = 'Contact saved successfully!';
            message.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: #28a745;
                color: white;
                padding: 15px 30px;
                border-radius: 10px;
                font-weight: bold;
                z-index: 1000;
                animation: fadeInOut 2s ease-in-out;
            `;
            
            // Add animation
            const style = document.createElement('style');
            style.textContent = `
                @keyframes fadeInOut {
                    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
                    50% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
                }
            `;
            document.head.appendChild(style);
            
            document.body.appendChild(message);
            setTimeout(() => {
                document.body.removeChild(message);
            }, 2000);
        }
    </script>
</body>
</html>
