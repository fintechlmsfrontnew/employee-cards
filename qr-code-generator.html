<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom QR Code Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #202c65 0%, #234294 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .generator-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            color: #202c65;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        .form-control:focus {
            outline: none;
            border-color: #202c65;
            box-shadow: 0 0 0 3px rgba(32, 44, 101, 0.1);
        }
        .generate-btn {
            background: linear-gradient(135deg, #202c65 0%, #234294 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(32, 44, 101, 0.3);
        }
        .qr-result {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            display: none;
        }
        .qr-result.show {
            display: block;
        }
        .qr-code {
            max-width: 200px;
            margin: 20px auto;
            border: 5px solid white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .qr-url {
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 12px;
            color: #202c65;
            border: 1px solid #e0e0e0;
        }
        .copy-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s ease;
        }
        .copy-btn:hover {
            background: #218838;
        }
        .copy-btn.copied {
            background: #6c757d;
        }
    </style>
</head>
<body>
    <div class="generator-container">
        <h2 class="text-center mb-4" style="color: #202c65; font-weight: 700;">
            <i class="fas fa-qrcode"></i> Custom QR Code Generator
        </h2>
        
        <div class="form-group">
            <label class="form-label">Enter Your URL</label>
            <input type="url" id="urlInput" class="form-control" 
                   placeholder="https://fintechlmsfrontnew.github.io/employee-cards/satendra.html"
                   value="https://fintechlmsfrontnew.github.io/employee-cards/satendra.html">
        </div>
        
        <div class="form-group">
            <label class="form-label">Custom Short URL (Optional)</label>
            <input type="text" id="customUrl" class="form-control" 
                   placeholder="my-custom-url">
        </div>
        
        <button class="generate-btn" onclick="generateQRCode()">
            <i class="fas fa-magic"></i> Generate QR Code
        </button>
        
        <div id="qrResult" class="qr-result">
            <h4 style="color: #202c65; margin-bottom: 20px;">Your QR Code</h4>
            <img id="qrImage" class="qr-code" src="" alt="QR Code">
            <div class="qr-url" id="qrUrl"></div>
            <button class="copy-btn" onclick="copyURL()">
                <i class="fas fa-copy"></i> Copy URL
            </button>
        </div>
    </div>

    <script>
        function generateQRCode() {
            const url = document.getElementById('urlInput').value;
            const customUrl = document.getElementById('customUrl').value;
            
            if (!url) {
                alert('Please enter a URL');
                return;
            }
            
            // Generate QR Code using QR Server API
            const qrApiUrl = customUrl ? 
                `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}&format=png&margin=10` :
                `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}&format=png&margin=10`;
            
            // Display QR Code
            document.getElementById('qrImage').src = qrApiUrl;
            document.getElementById('qrUrl').textContent = url;
            document.getElementById('qrResult').classList.add('show');
            
            // Scroll to result
            document.getElementById('qrResult').scrollIntoView({ behavior: 'smooth' });
        }
        
        function copyURL() {
            const urlText = document.getElementById('qrUrl').textContent;
            const copyBtn = event.target;
            
            navigator.clipboard.writeText(urlText).then(() => {
                copyBtn.textContent = '✓ Copied!';
                copyBtn.classList.add('copied');
                
                setTimeout(() => {
                    copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy URL';
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
        }
        
        // Generate on Enter key
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateQRCode();
            }
        });
        
        document.getElementById('customUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateQRCode();
            }
        });
    </script>
</body>
</html>
