<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Digital Cards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .employee-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 30px;
            margin: 20px auto;
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .employee-card:hover {
            transform: translateY(-5px);
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
            margin-bottom: 20px;
        }
        .employee-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .employee-designation {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .contact-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .contact-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #667eea;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .contact-icon:hover {
            background: #667eea;
            color: white;
            transform: scale(1.1);
        }
        .contact-info {
            text-align: left;
            margin-top: 20px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .contact-item i {
            width: 30px;
            color: #667eea;
            margin-right: 15px;
        }
        .contact-item a {
            color: #333;
            text-decoration: none;
        }
        .contact-item a:hover {
            color: #667eea;
        }
        .add-contact-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        .add-contact-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="employee-card">
            <img src="https://via.placeholder.com/120x120/667eea/ffffff?text=PROFILE" alt="Profile" class="profile-img">
            
            <h1 class="employee-name">EMPLOYEE_NAME</h1>
            <p class="employee-designation">EMPLOYEE_DESIGNATION</p>
            <p class="employee-designation">COMPANY_NAME</p>
            
            <div class="contact-icons">
                <a href="tel:EMPLOYEE_PHONE" class="contact-icon">
                    <i class="fas fa-phone"></i>
                </a>
                <a href="mailto:EMPLOYEE_EMAIL" class="contact-icon">
                    <i class="fas fa-envelope"></i>
                </a>
                <a href="EMPLOYEE_LOCATION_LINK" class="contact-icon">
                    <i class="fas fa-map-marker-alt"></i>
                </a>
            </div>
            
            <div class="contact-info">
                <div class="contact-item">
                    <i class="fas fa-phone"></i>
                    <div>
                        <strong>Phone:</strong>
                        <a href="tel:EMPLOYEE_PHONE">EMPLOYEE_PHONE</a>
                    </div>
                </div>
                
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <strong>Email:</strong>
                        <a href="mailto:EMPLOYEE_EMAIL">EMPLOYEE_EMAIL</a>
                    </div>
                </div>
                
                <div class="contact-item">
                    <i class="fas fa-globe"></i>
                    <div>
                        <strong>Website:</strong>
                        <a href="EMPLOYEE_WEBSITE" target="_blank">EMPLOYEE_WEBSITE</a>
                    </div>
                </div>
                
                <div class="contact-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <div>
                        <strong>Location:</strong>
                        <a href="EMPLOYEE_LOCATION_LINK" target="_blank">EMPLOYEE_LOCATION</a>
                    </div>
                </div>
            </div>
            
            <button class="add-contact-btn">
                <i class="fas fa-user-plus"></i> Add Contact
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
